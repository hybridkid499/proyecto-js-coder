<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist App</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- type="module" habilita ES6 imports. Carga diferida por defecto. -->
    <script type="module" src="javascript/main.js"></script>
  </head>

  <body>
    <header>
      <h1>Playlist App</h1>
    </header>

    <main>
      <!-- ── Controles de reproducción ─────────────────────────── -->
      <section id="controles" aria-label="Controles de reproducción">
        <button id="verPlaylist">Ver playlist</button>
        <button id="reproducir">▶ Reproducir actual</button>
        <button id="anterior">← Anterior</button>
        <button id="siguiente">Siguiente →</button>
      </section>

      <hr />

      <!-- ── Agregar canción ────────────────────────────────────── -->
      <section aria-label="Agregar canción">
        <h2>Agregar canción</h2>
        <input type="text" id="inputTitulo" placeholder="Título" autocomplete="off" />
        <input type="text" id="inputArtista" placeholder="Artista" autocomplete="off" />
        <input type="text" id="inputDuracion" placeholder="Duración (mm:ss)" autocomplete="off" />
        <button id="btnAgregar">Agregar</button>
      </section>

      <hr />

      <!-- ── Buscar canción ─────────────────────────────────────── -->
      <section aria-label="Buscar canción">
        <h2>Buscar canción</h2>
        <input type="text" id="inputBuscarTitulo" placeholder="Título" autocomplete="off" />
        <input type="text" id="inputBuscarArtista" placeholder="Artista" autocomplete="off" />
        <button id="btnBuscar">Buscar</button>
      </section>

      <hr />

      <!-- ── Ir a canción por número ────────────────────────────── -->
      <section aria-label="Ir a canción por número">
        <h2>Ir a canción por número</h2>
        <input type="number" id="inputNumero" min="1" placeholder="Número de canción" />
        <button id="btnIrA">Ir</button>
      </section>

      <hr />

      <!-- ── Editar canción ─────────────────────────────────────── -->
      <section aria-label="Editar canción">
        <h2>Editar canción</h2>
        <input type="text" id="inputEditarBuscar" placeholder="Título de la canción a editar" autocomplete="off" />
        <input type="text" id="inputEditarArtistaOriginal" placeholder="Artista original" autocomplete="off" />
        <button id="btnEditar">Buscar para editar</button>

        <div id="seccionEditar" class="oculto">
          <input type="text" id="inputEditarTitulo" placeholder="Nuevo título" autocomplete="off" />
          <input type="text" id="inputEditarArtista" placeholder="Nuevo artista" autocomplete="off" />
          <input type="text" id="inputEditarDuracion" placeholder="Nueva duración (mm:ss)" autocomplete="off" />
          <button id="btnEditarConfirmar">Confirmar edición</button>
        </div>
      </section>

      <hr />

      <!-- ── Eliminar canción ───────────────────────────────────── -->
      <section aria-label="Eliminar canción">
        <h2>Eliminar canción</h2>
        <input type="text" id="inputEliminarTitulo" placeholder="Título" autocomplete="off" />
        <input type="text" id="inputEliminarArtista" placeholder="Artista" autocomplete="off" />
        <button id="btnEliminarCancion">Eliminar</button>
      </section>

      <hr />

      <!-- ── Borrar playlist ────────────────────────────────────── -->
      <section aria-label="Borrar playlist">
        <h2>Borrar toda la playlist</h2>
        <button id="btnBorrar">Borrar playlist</button>
        <button id="btnConfirmarBorrado" class="oculto btn-peligro">Confirmar borrado</button>
      </section>

      <!-- ── Área de información / resultados ───────────────────── -->
      <div id="info" aria-live="polite"></div>
    </main>
  </body>
</html>
